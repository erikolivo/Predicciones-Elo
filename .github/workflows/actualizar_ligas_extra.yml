name: Actualizar ligas extra (semanal)

on:
  schedule:
    # Una vez por semana, lunes a las 09:00 UTC (4am Colombia/Perú/Ecuador),
    # a propósito en horario sin partidos para no competir con la
    # vigilancia en vivo por el cupo de API-Football.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Actualizar Goal Index de ligas extra
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python actualizar_ligas_extra.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/goal_index_extra.json
          git diff --quiet --cached || git commit -m "Actualizar goal index de ligas extra"
          git push
