name: Resumen matutino a Telegram

on:
  schedule:
    # 12:00 UTC = 07:00 (7am) en Colombia/Perú/Ecuador (UTC-5).
    # Se corre 1 hora después de "Agenda de partidos de hoy", para darle
    # tiempo a que esa lista ya esté generada.
    #   México (UTC-6) -> "0 13 * * *"
    #   Chile/Argentina (UTC-3) -> "0 10 * * *"
    #   España (UTC+1/+2) -> "0 6 * * *" o "0 5 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  resumen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Enviar resumen del día a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python resumen.py
