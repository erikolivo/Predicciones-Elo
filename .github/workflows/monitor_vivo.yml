name: Vigilancia en vivo

on:
  schedule:
    # Cada 15 minutos. El script revisa solo/rápido si no hay nada en vivo,
    # así que no pasa nada si corre en horas sin partidos: casi no gasta cupo.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  vigilar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Revisar partidos en vivo y avisar por Telegram si aplica
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Guardar estado (para no repetir alertas)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vigilancia.json
          git diff --quiet --cached || git commit -m "Actualizar estado de vigilancia"
          git push
